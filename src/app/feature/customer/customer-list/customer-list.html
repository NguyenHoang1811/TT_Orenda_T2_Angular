<!-- customer-list.component.html -->
<button nz-button nzType="primary" (click)="openAddModal()" style="margin-bottom: 16px;">
  + Thêm khách hàng
</button>

<nz-table
  #basicTable
  [nzData]="listOfData"
  [nzFrontPagination]="false"
  [nzTotal]="total"
  [nzPageIndex]="pageIndex"
  [nzPageSize]="pageSize"
  (nzPageIndexChange)="onPageIndexChange($event)"
>
  <thead>
    <tr>
      <th>Mã KH</th>
      <th>Tên khách hàng</th>
      <th>Tuổi</th>
      <th>Địa chỉ</th>
      <th>Thao tác</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let data of listOfData">
      <td>{{ data.customerCode }}</td>
      <td>{{ data.customerName }}</td>
      <td>{{ data.age }}</td>
      <td>{{ data.address }}</td>
      <td>
        <a (click)="openViewModal(data)">Xem</a>
        <nz-divider nzType="vertical"></nz-divider>
        <a (click)="openEditModal(data)">Sửa</a>
        <nz-divider nzType="vertical"></nz-divider>
        <a (click)="confirmDelete(data)" style="color: red;">Xoá</a>
      </td>
    </tr>
  </tbody>
</nz-table>
